name: Update Last Modified

on:
  push:
    branches: [ main ]
    paths-ignore:
      - README.md

jobs:
  update-timestamp:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          TIMESTAMP=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M')
          sed -i "s/最終更新: .*/最終更新: ${TIMESTAMP}/" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "docs: 最終更新日時を更新" && git push)
