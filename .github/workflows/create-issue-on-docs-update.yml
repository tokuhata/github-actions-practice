name: Create Issue on Docs Update

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**/*.md'

jobs:
  create-issue:
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'docs/*.md' 2>/dev/null | tr '\n' ', ' | sed 's/,$//')
          echo "files=${FILES}" >> $GITHUB_OUTPUT
      
      - name: Create Issue
        if: steps.changed.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          TIMESTAMP=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M')
          gh issue create \
            --title "📝 ドキュメントが更新されました" \
            --body "以下のファイルが更新されました：${CHANGED_FILES} / 更新日時: ${TIMESTAMP}"
